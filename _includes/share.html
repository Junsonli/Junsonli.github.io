<section class="share">
    <h3>Share</h3>
    <a href="javascript:void(0)" class="share-btn" onclick="copyToClipboard('{{ site.url }}{{ page.url }}')" title="复制链接">
        <svg class="share-icon-link" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
        </svg>
        <span>复制链接</span>
    </a>
</section>
<script>
function copyToClipboard(text) {
    var msg = '链接已复制';
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
            alert(msg);
        }).catch(function() {
            fallbackCopy(text, msg);
        });
    } else {
        fallbackCopy(text, msg);
    }
}
function fallbackCopy(text, msg) {
    var input = document.createElement('input');
    input.value = text;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    alert(msg);
}
</script>
